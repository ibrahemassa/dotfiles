#############################################
# VARIABLES
#############################################

$mod = SUPER

#############################################
# MONITORS (replace xrandr)
#############################################

monitor=HDMI-A-2,1920x1080@144,0x0,1
monitor=eDP-1,1920x1080@144,1920x0,1

#############################################
# AUTOSTART (replace exec)
#############################################

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Keyboard layout
exec-once = setxkbmap -layout us,ara -option grp:alt_shift_toggle

# Wallpaper (better: use swww)
exec-once = hyprpaper
#exec-once = swww init
#exec-once = swww img /home/ibrahem/Pictures/Wallpapers/catpuccin_railroad-2.jpg

exec-once = ./auto_wallpaper.sh

# Bar (replace polybar ideally with waybar)
exec-once = waybar

# Polkit
exec-once = /usr/lib/polkit-kde-authentication-agent-1

exec-once = wl-paste --type text --watch cliphist store
exec-once = ~/.config/hypr/autostart.sh

#############################################
# INPUT (replaces xinput)
#############################################

input {
    kb_layout = us,ara
    kb_options = grp:alt_shift_toggle

    touchpad {
        natural_scroll = yes
    }

    sensitivity = 0
}
device{
    name = elan1205:00-04f3:30e9-touchpad
    sensitivity = -0.05
  }

#############################################
# GENERAL LOOK (gaps, borders)
#############################################

general {
    gaps_in = 9
    gaps_out = 2
    border_size = 1
    col.active_border = rgb(cdd6f4)
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

#############################################
# DECORATION (replaces picom)
#############################################

decoration {
    rounding = 8

    blur {
        enabled = yes
        size = 1
        passes = 1
    }

    shadow {
        enabled = yes
    }
}


#############################################
# LAYOUT SETTINGS
#############################################

dwindle {
    pseudotile = yes
    preserve_split = yes
}

#############################################
# ANIMATIONS (optional but nice)
#############################################

animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 5, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

gesture = 3, horizontal, workspace
gesture = 3, pinch, resize
gesture = 4, vertical, float

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe_touch = true
   #workspace_swipe = true
}

#############################################
# KEYBINDINGS
#############################################

# Apps
bind = $mod, Q, exec, kitty
bind = $mod SHIFT, Q, killactive
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod, R, exec, killall -SIGUSR2 waybar

bind = $mod, E, exec, nautilus --browser
bind = $mod, D, exec, ~/.config/rofi/bin/launcher
bind = $mod, M, exec, wlogout --protocol layer-shell # show the logout window
bind = $mod SHIFT, M, exit, # Exit Hyprland all together no (force quit Hyprland)

bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $mod, P, pseudo, # dwindle
bind = $mod, J, togglesplit, # dwindle
bind = $mod, S, exec, grim -g "$(slurp)" - | swappy -f - # take a screenshot

bind = $mod SHIFT, W, exec, ~/shell_scripts/hypr_wallpapers.sh


#bind = $mod SHIFT, W, exec, ~/shell_scripts/i3_wallpapers.sh
bind = , Print, exec, flameshot gui
bind = $mod SHIFT, S, exec, flameshot gui

bind = $mod ALT, B, exec, brave
bind = $mod ALT, C, exec, chromium

#############################################
# MEDIA KEYS
#############################################

bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5

bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
bind = , XF86MonBrightnessUp, exec, brightnessctl set 10%+

#############################################
# WORKSPACES
#############################################

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

#############################################
# FOCUS / MOVE
#############################################

bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

#############################################
# WINDOW MODES
#############################################

bind = $mod, F, togglefloating
bind = $mod, F11, fullscreen

#############################################
# MOUSE (floating modifier)
#############################################

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

#############################################
# ASUS ROG KEYS
#############################################

bind = , XF86Launch1, exec, rog-control-center
bind = , XF86LaunchA, exec, asusctl profile -n; pkill -SIGRTMIN+8 waybar
bind = , XF86AudioMicMute, exec, pamixer --default-source -t
bind = , XF86KbdBrightnessDown, exec, brightnessctl -d asus::kbd_backlight set 33%-
bind = , XF86KbdBrightnessUp, exec, brightnessctl -d asus::kbd_backlight set 33%+
bind = , XF86Tools, exec, asusctl led-mode -n
